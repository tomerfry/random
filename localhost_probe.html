<!DOCTYPE html>
<html>
<head><title>Localhost Probe</title></head>
<body>
<h2>Localhost Service Probe</h2>
<div id="r" style="font-family:monospace;white-space:pre-wrap;font-size:10px;background:#eee;padding:8px;word-break:break-all;"></div>
<script>
var r = document.getElementById('r');
function log(msg) { r.textContent += msg + '\n'; }

log('=== Localhost Service Identification ===');
log('');

// Probe known Samsung service ports with fetch
var targets = [
  {port: 8080, desc: 'Common HTTP'},
  {port: 8443, desc: 'Common HTTPS'},
  {port: 5000, desc: 'Common dev server'},
  {port: 3000, desc: 'Common dev server'},
  {port: 7777, desc: 'Unknown'},
  {port: 4443, desc: 'Alt HTTPS'},
  {port: 8766, desc: 'SmartThings Hub Local API'},
  {port: 8888, desc: 'Common HTTP alt'},
  {port: 9090, desc: 'Common admin'},
  {port: 55555, desc: 'ADB/debug'},
  {port: 8200, desc: 'Samsung Knox'},
  {port: 9000, desc: 'Samsung service'},
  {port: 9001, desc: 'Samsung service'},
  {port: 8081, desc: 'Alt HTTP'},
  {port: 5555, desc: 'ADB wireless'},
  {port: 8082, desc: 'Samsung service'},
  {port: 19400, desc: 'Samsung AllShare'},
  {port: 19300, desc: 'Samsung AllShare'},
  {port: 7676, desc: 'Samsung service'},
  {port: 7678, desc: 'Samsung Wallet/Pay'},
  {port: 8084, desc: 'Samsung service'},
  {port: 1080, desc: 'SOCKS'},
  {port: 12345, desc: 'Common debug'},
  {port: 34567, desc: 'Samsung debug'},
  {port: 40000, desc: 'Samsung service'},
  {port: 58080, desc: 'Samsung service'},
];

var done = 0;
var total = targets.length;

targets.forEach(function(t) {
  // Try HTTP GET with no-cors
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 3000);

  fetch('http://127.0.0.1:' + t.port + '/', {
    mode: 'no-cors',
    signal: controller.signal
  }).then(function(resp) {
    clearTimeout(timeout);
    log('[OPEN] Port ' + t.port + ' (' + t.desc + ') - responded');
    done++;
    // Try to get more info with cors mode
    return fetch('http://127.0.0.1:' + t.port + '/', {signal: AbortSignal.timeout(3000)})
      .then(function(resp2) {
        log('  Status: ' + resp2.status + ' ' + resp2.statusText);
        log('  Type: ' + resp2.type);
        log('  Headers:');
        resp2.headers.forEach(function(v, k) { log('    ' + k + ': ' + v); });
        return resp2.text().then(function(body) {
          log('  Body (' + body.length + ' bytes): ' + body.substring(0, 300));
        });
      }).catch(function(e2) { log('  Detail probe: ' + e2.message); });
  }).catch(function(e) {
    clearTimeout(timeout);
    done++;
    if (e.name === 'AbortError') {
      log('[TIMEOUT] Port ' + t.port + ' (' + t.desc + ')');
    } else {
      log('[CLOSED] Port ' + t.port + ' (' + t.desc + ') - ' + e.message);
    }
  });
});

// Also probe specific Samsung API endpoints on known ports
setTimeout(function() {
  log('');
  log('=== Samsung-specific endpoint probes ===');

  // SmartThings local API
  fetch('http://127.0.0.1:8766/api/v1/devices', {signal: AbortSignal.timeout(3000)})
    .then(function(r) { return r.text(); })
    .then(function(t) { log('[SmartThings 8766] /api/v1/devices: ' + t.substring(0,300)); })
    .catch(function(e) { log('[SmartThings 8766] ' + e.message); });

  // Samsung Pay local service
  fetch('http://127.0.0.1:7678/', {signal: AbortSignal.timeout(3000)})
    .then(function(r) { return r.text(); })
    .then(function(t) { log('[SPay 7678] /: ' + t.substring(0,300)); })
    .catch(function(e) { log('[SPay 7678] ' + e.message); });

  // Try common Samsung WebSocket endpoints
  try {
    var ws = new WebSocket('ws://127.0.0.1:8080');
    ws.onopen = function() { log('[WS 8080] WebSocket CONNECTED'); ws.close(); };
    ws.onerror = function() { log('[WS 8080] WebSocket error'); };
    ws.onmessage = function(e) { log('[WS 8080] Message: ' + e.data.substring(0,200)); };
  } catch(e) { log('[WS 8080] ' + e); }

  try {
    var ws2 = new WebSocket('ws://127.0.0.1:8766');
    ws2.onopen = function() { log('[WS 8766] WebSocket CONNECTED'); ws2.close(); };
    ws2.onerror = function() { log('[WS 8766] WebSocket error'); };
    ws2.onmessage = function(e) { log('[WS 8766] Message: ' + e.data.substring(0,200)); };
  } catch(e) { log('[WS 8766] ' + e); }

}, 5000);

setTimeout(function() {
  log('');
  log('=== Scan complete ===');
}, 10000);

</script>
</body>
</html>
